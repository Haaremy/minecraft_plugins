# Haaremy Lobby - Lobby-Einstellungen
# Pfad: minecraftServers/hmySettings/lobby.yml

lobby:
  world: "lobby"
  rules:
    weather: false           # Wetter deaktivieren
    daylight-cycle: false    # Tag/Nacht-Zyklus deaktivieren
    mob-spawning: false      # Mob-Spawning verhindern
    fire-tick: false         # Feuer-Tick deaktivieren (GameRule)
    pvp: false               # PvP deaktivieren
    hunger: false            # Hunger deaktivieren
    fall-damage: false       # Fallschaden deaktivieren
    all-damage: false        # Alle anderen Schadensarten deaktivieren
    block-protection: true   # Block-Abbauen/Platzieren verhindern
    void-protection: true    # Spieler aus dem Void retten
    fire-spread: true        # Feuer-Ausbreitung auf Blöcke verhindern
    leaf-decay: false        # Blätter-Verfall verhindern
    item-drop: false         # Item-Droppen verhindern
    item-pickup: false       # Item-Aufheben verhindern
    interaction-block: false # Kisten/Türen-Interaktion sperren
    explosion-protection: true  # Explosionen verhindern
    crop-trampling: true     # Farmland-Zertrampeln verhindern
    anti-wdl: true           # World Downloader-Mod erkennen und kicken

teleport-points:
  spawn:
    name: "§aSpawn"
    world: "lobby"
    x: 0.5
    y: 64.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
  # Weitere Punkte hier eintragen:
  # arena:
  #   name: "§cArena"
  #   world: "lobby"
  #   x: 100.0
  #   y: 64.0
  #   z: 50.0
  #   yaw: 90.0
  #   pitch: 0.0

server-selector:
  enabled: true
  entries:
    survival:
      x: 4
      y: 1
      blocktype: "GRASS_BLOCK"
      name: "§aSurvival-Server"
      lore:
        - "§7Klicke zum Wechseln"
      server: "vanilla"
    creative:
      x: 6
      y: 1
      blocktype: "WHITE_WOOL"
      name: "§fCreative-Server"
      lore:
        - "§7Klicke zum Wechseln"
      server: "creative"
