name: hmyPaper
version: "1.0"
main: de.haaremy.hmypaper.HmyPaperPlugin
api-version: 1.19
depend: [LuckPerms]
description: Ein Plugin von @Haaremy zur Integration in einen Paper Server mit LuckPerms.
author: Haaremy
website: haaremy.de
commands:
  help:
    description: Zeigt eine Liste der verfügbaren Befehle an.
    usage: /help [Seite]
    permission: hmy.help
  rules:
    description: Zeigt die Serverregeln an.
    usage: /rules [Seite]
    permission: hmy.rules
  lobby:
    description: "Teleportiert dich zum Lobby-Server."
    usage: "/lobby"
  spawn:
    description: "Teleportiert dich zum Welt-Spawnpunkt."
    usage: "/spawn"
  fly:
    description: Aktiviert/Deaktiviert das Fliegen.
    usage: /fly [Spieler]
    permission: hmy.fly
  weather:
    description: Ändert das Wetter.
    usage: /weather [sonne|regen|sturm] [Dauer]
    permission: hmy.weather
  gm:
    description: Ändert den Spielmodus (optional für einen anderen Spieler).
    usage: /gm <name|id> [Spieler]
    permission: hmy.gm
  time:
    description: Setzt die Weltzeit (Zahl oder day/noon/night/midnight).
    usage: /time <day|noon|night|midnight|Zahl>
    permission: hmy.time
  lightning:
    description: Lässt einen Blitz einschlagen.
    usage: /lightning [Spieler]
    permission: hmy.lightning
  speed:
    description: Ändert die Geh- oder Fluggeschwindigkeit.
    usage: /speed [Spieler] [walk|fly] [Geschwindigkeit]
    permission: hmy.speed
  skull:
    description: Gibt den Kopf eines Spielers.
    usage: /skull [Spieler]
    permission: hmy.skull
  mute:
    description: Stummschaltet einen Spieler.
    usage: /mute [Spieler]
    permission: hmy.mute
  dm:
    description: Sendet eine private Nachricht.
    usage: /dm [Spieler] [Nachricht]
    permission: hmy.dm
  broadcast:
    description: Sendet eine Nachricht an den gesamten Server.
    usage: /broadcast [proxy|server|world] [Nachricht]
    permission: hmy.broadcast
  r:
    description: Antwortet auf die letzte Nachricht.
    usage: /r [Nachricht]
    permission: hmy.r
  tempban:
    description: Sperrt einen Spieler temporär.
    usage: /tempban [Spieler] [Dauer] [Grund]
    permission: hmy.tempban
  tempbanip:
    description: Sperrt eine IP-Adresse temporär.
    usage: /tempbanip [Spieler] [Dauer] [Grund]
    permission: hmy.tempbanip
  unban:
    description: Entsperrt einen Spieler.
    usage: /unban [Spieler]
    permission: hmy.unban
  unbanip:
    description: Entsperrt eine IP-Adresse.
    usage: /unbanip [IP]
    permission: hmy.unbanip
  kickall:
    description: Kickt alle Spieler.
    usage: /kickall [Grund]
    permission: hmy.kickall
  kick:
    description: Kickt einen Spieler.
    usage: /kick [Spieler] [Grund]
    permission: hmy.kick
  ban:
    description: Sperrt einen Spieler dauerhaft.
    usage: /ban [Spieler] [Grund]
    permission: hmy.ban
  banip:
    description: Sperrt eine IP-Adresse dauerhaft.
    usage: /banip [IP] [Grund]
    permission: hmy.banip
  seen:
    description: Zeigt die letzte Abmeldezeit eines Spielers.
    usage: /seen [Spieler]
    permission: hmy.seen
  getpos:
    description: Zeigt die Position eines Spielers.
    usage: /getpos [Spieler]
    permission: hmy.getpos
  socialspy:
    description: Aktiviert/Deaktiviert SocialSpy.
    usage: /socialspy [on|off]
    permission: hmy.socialspy
  vanish:
    description: Macht den Spieler unsichtbar.
    usage: /vanish
    permission: hmy.vanish
  kill:
    description: Tötet einen Spieler oder ein Wesen.
    usage: /kill [Spieler|Entity]
    permission: hmy.kill
  invsee:
    description: Zeigt das Inventar eines Spielers an.
    usage: /invsee [Spieler]
    permission: hmy.invsee
  sudo:
    description: Lässt einen Spieler einen Befehl ausführen.
    usage: /sudo [Spieler] [Befehl]
    permission: hmy.sudo
  give:
    description: Gibt einem Spieler ein Item.
    usage: /give [Spieler] [Item] [Anzahl]
    permission: hmy.give
  triggervelocity:
    description: Triggert einen Velocity-Befehl.
    permission: hmy.triggervelocity
  world:
    description: Switch world.
    permission: hmy.world
  heal:
    description: Heilt einen Spieler vollständig.
    usage: /heal [Spieler]
    permission: hmy.heal
  feed:
    description: Sättigt einen Spieler vollständig.
    usage: /feed [Spieler]
    permission: hmy.feed
  tp:
    description: Teleportiert einen Spieler zu einem anderen.
    usage: /tp <Spieler> [Ziel]
    permission: hmy.tp
  tphere:
    description: Teleportiert einen Spieler zu dir.
    usage: /tphere <Spieler>
    permission: hmy.tphere
  back:
    description: Teleportiert dich zur letzten Position.
    usage: /back
    permission: hmy.back
  workbench:
    description: Öffnet eine virtuelle Werkbank.
    usage: /workbench
    permission: hmy.workbench
  enderchest:
    description: Öffnet die eigene oder fremde Endertruhe.
    usage: /enderchest [Spieler]
    permission: hmy.enderchest
  repair:
    description: Repariert das Item in der Hand oder alle Items.
    usage: /repair [all]
    permission: hmy.repair
  sethome:
    description: Setzt einen Home-Punkt (Slot 1-5).
    usage: /sethome [1-5]
    permission: hmy.home.1
  home:
    description: Teleportiert zum gesetzten Home-Punkt (Slot 1-5).
    usage: /home [1-5]
    permission: hmy.home.1
  worlds:
    description: Zeigt alle verfügbaren Welten an.
    usage: /worlds
    permission: hmy.worlds
  parkour:
    description: Verwaltet Parkours.
    usage: /parkour <create|delete|setstart|setgoal|setcheckpoint|quit|list> [args]
    permission: hmy.parkour
permissions:
  hmy.gm.other:
    description: Erlaubt das Ändern des Spielmodus anderer Spieler.
    default: op
  hmy.heal:
    description: Erlaubt das Heilen der eigenen Person.
    default: op
  hmy.heal.other:
    description: Erlaubt das Heilen anderer Spieler.
    default: op
  hmy.feed:
    description: Erlaubt das Sättigen der eigenen Person.
    default: op
  hmy.feed.other:
    description: Erlaubt das Sättigen anderer Spieler.
    default: op
  hmy.tp:
    description: Erlaubt das Teleportieren zu einem Spieler.
    default: op
  hmy.tp.other:
    description: Erlaubt das Teleportieren anderer Spieler.
    default: op
  hmy.tphere:
    description: Erlaubt das Teleportieren von Spielern zu sich.
    default: op
  hmy.back:
    description: Erlaubt das Zurückteleportieren zur letzten Position.
    default: op
  hmy.workbench:
    description: Erlaubt das Öffnen einer virtuellen Werkbank.
    default: op
  hmy.enderchest:
    description: Erlaubt das Öffnen der eigenen Endertruhe.
    default: op
  hmy.enderchest.other:
    description: Erlaubt das Öffnen der Endertruhe anderer Spieler.
    default: op
  hmy.repair:
    description: Erlaubt das Reparieren des Items in der Hand.
    default: op
  hmy.repair.all:
    description: Erlaubt das Reparieren aller Items im Inventar.
    default: op
  hmy.home.1:
    description: Erlaubt Home-Slot 1.
    default: true
  hmy.home.2:
    description: Erlaubt Home-Slot 2.
    default: false
  hmy.home.3:
    description: Erlaubt Home-Slot 3.
    default: false
  hmy.home.4:
    description: Erlaubt Home-Slot 4.
    default: false
  hmy.home.5:
    description: Erlaubt Home-Slot 5.
    default: false
  hmy.worlds:
    description: Erlaubt das Anzeigen verfügbarer Welten.
    default: op
  hmy.parkour:
    description: Erlaubt die Nutzung von Parkour-Befehlen (quit, list).
    default: true
  hmy.parkour.admin:
    description: Erlaubt das Erstellen und Verwalten von Parkours.
    default: op